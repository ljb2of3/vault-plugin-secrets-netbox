name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default; individual jobs add scopes if they need them.
permissions:
  contents: read

jobs:
  test:
    name: test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # golangci-lint bundles govet, so a separate vet job isn't needed.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: check gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofmt-clean:"
            echo "$files"
            exit 1
          fi

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  license:
    name: license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-copywrite@v1
      - name: check headers
        run: copywrite headers --plan
